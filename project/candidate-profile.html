<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Franchise Generation — Profil candidat</title>
<link rel="stylesheet" href="fg.css" />
</head>
<body class="fg-mode">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="fg-data.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useMemo } = React;
const FG = window.FG_DATA;

function App() {
  const params = new URLSearchParams(window.location.search);
  const candidateId = params.get('candidate') || 'cand-001';
  const baseCandidate = FG.CANDIDATES.find(c => c.id === candidateId) || FG.CANDIDATES[0];
  const [candidate, setCandidate] = useState(baseCandidate);
  const [editing, setEditing] = useState(false);
  const [compareOpen, setCompareOpen] = useState(false);

  const hasValidated = candidate.opportunities.some(o => o.validationStatus === 'validated');
  const validatedOpp = candidate.opportunities.find(o => o.validationStatus === 'validated');

  const setField = (k, v) => setCandidate(c => ({ ...c, [k]: v }));
  const setOpp = (oppLinkId, k, v) => setCandidate(c => ({
    ...c,
    opportunities: c.opportunities.map(o => o.id === oppLinkId ? { ...o, [k]: v } : o)
  }));
  const validateOpp = (oppLinkId) => {
    setCandidate(c => ({
      ...c,
      generalStatus: 'Validé — workflow démarré',
      opportunities: c.opportunities.map(o => {
        if (o.id === oppLinkId) return { ...o, validationStatus: 'validated' };
        // soft auto-reject the others
        if (o.validationStatus !== 'rejected' && o.validationStatus !== 'on-hold') {
          return { ...o, validationStatus: 'on-hold' };
        }
        return o;
      })
    }));
  };

  return (
    <div className="cp">
      <header className="cp-top">
        <div className="cp-top__left">
          <img src="img/fg-logo.png" alt="Franchise Generation" className="cp-top__logo" />
          <span className="cp-top__crumb">Consultant workspace › Candidats › <strong>{candidate.firstName} {candidate.lastName}</strong></span>
        </div>
        <div className="cp-top__right">
          <a href="consultant.html" className="lp-btn lp-btn--ghost lp-btn--sm">← Pipeline</a>
          <a href="ecosystem.html" className="lp-btn lp-btn--ghost lp-btn--sm">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: 14, height: 14 }}><circle cx="12" cy="12" r="3"/><circle cx="5" cy="6" r="2"/><circle cx="19" cy="6" r="2"/><circle cx="5" cy="18" r="2"/><circle cx="19" cy="18" r="2"/><path d="M10 11L7 7M14 11l3-4M10 13l-3 4M14 13l3 4"/></svg>
            Écosystème
          </a>
        </div>
      </header>

      <main className="cp-main">
        {/* Header */}
        <div className="cp-head">
          <div className="cp-head__id">
            <div className="cp-head__avatar">{candidate.firstName[0]}{candidate.lastName[0]}</div>
            <div>
              <h1 className="cp-head__name">{candidate.firstName} {candidate.lastName}</h1>
              <p className="cp-head__sub">{candidate.email} · {candidate.phone}</p>
            </div>
          </div>
          <div className="cp-head__status">
            <span className={'cp-status-pill ' + (hasValidated ? 'is-validated' : 'is-pending')}>
              {hasValidated ? '✓ Workflow lancé' : '⏵ ' + candidate.generalStatus}
            </span>
            <button className="lp-btn lp-btn--ghost lp-btn--sm" onClick={() => setEditing(e => !e)}>
              {editing ? 'Terminer l\'édition' : 'Modifier le profil'}
            </button>
          </div>
        </div>

        {/* Workflow lock banner — only one opportunity can become the workflow */}
        <div className={'cp-banner ' + (hasValidated ? 'is-validated' : 'is-locked')}>
          <span className="cp-banner__icon">
            {hasValidated
              ? <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
              : <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>}
          </span>
          <div>
            <p className="cp-banner__title">
              {hasValidated
                ? `Workflow démarré sur ${validatedOpp ? FG.ONBOARDING_OPPORTUNITIES.find(o => o.id === validatedOpp.opportunityId)?.name : 'l\'opportunité'} `
                : 'Étape obligatoire — Analyse des opportunités avec le consultant'}
            </p>
            <p className="cp-banner__sub">
              {hasValidated
                ? 'Les autres opportunités sont automatiquement mises en attente. Le suivi détaillé est disponible dans la page Espace candidat.'
                : 'Comparer les opportunités possibles, vérifier budget / localisation / motivation, et valider celle qui sera officiellement lancée. Le workflow complet ne peut pas démarrer tant qu\'aucune opportunité n\'est validée.'}
            </p>
          </div>
          {!hasValidated && (
            <button className="lp-btn lp-btn--primary lp-btn--sm" onClick={() => setCompareOpen(true)}>
              Comparer les opportunités
            </button>
          )}
        </div>

        <div className="cp-grid">
          {/* PROFILE LEFT */}
          <section className="cp-card">
            <div className="cp-card__head">
              <h2 className="cp-card__title">Profil candidat</h2>
              <span className="cp-card__sub">Modifiable à tout moment par l'équipe autorisée</span>
            </div>

            <Field label="Nom complet" value={`${candidate.firstName} ${candidate.lastName}`} editable={editing}
              onChange={(v) => { const [f, ...r] = v.split(' '); setField('firstName', f); setField('lastName', r.join(' ')); }} />
            <Field label="Email" value={candidate.email} editable={editing} onChange={(v) => setField('email', v)} />
            <Field label="Téléphone" value={candidate.phone} editable={editing} onChange={(v) => setField('phone', v)} />
            <Field label="Adresse" value={candidate.address} editable={editing} onChange={(v) => setField('address', v)} />
            <FieldSelect label="Région souhaitée" value={candidate.preferredRegion} editable={editing}
              options={FG.REGIONS.map(r => ({ value: r.id, label: r.label }))}
              displayed={FG.REGIONS.find(r => r.id === candidate.preferredRegion)?.label}
              onChange={(v) => setField('preferredRegion', v)} />
            <Field label="Langues" value={candidate.language} editable={editing} onChange={(v) => setField('language', v)} />

            <SectionLabel>Parcours & motivation</SectionLabel>
            <Field label="Expérience professionnelle" value={candidate.experience} multiline editable={editing} onChange={(v) => setField('experience', v)} />
            <Field label="Situation actuelle" value={candidate.currentSituation} editable={editing} onChange={(v) => setField('currentSituation', v)} />
            <Field label="Motivation" value={candidate.motivation} multiline editable={editing} onChange={(v) => setField('motivation', v)} />

            <SectionLabel>Capacité financière</SectionLabel>
            <Field label="Budget disponible" value={FG.fmtEur(candidate.budget)} editable={editing}
              onChange={(v) => setField('budget', parseInt(v.replace(/\D/g, ''), 10) || 0)} />
            <Field label="Capacité de financement estimée" value={candidate.financingCapacity} multiline editable={editing}
              onChange={(v) => setField('financingCapacity', v)} />

            <SectionLabel>Préférences</SectionLabel>
            <div className="cp-field">
              <p className="cp-field__l">Marques préférées</p>
              <div className="cp-brand-tags">
                {FG.BRANDS.map(b => {
                  const active = candidate.brandPreference.includes(b.id);
                  return (
                    <button key={b.id}
                      className={'cp-brand-tag' + (active ? ' is-active' : '')}
                      disabled={!editing}
                      style={{ '--bb': b.tokens.primary }}
                      onClick={() => setField('brandPreference', active
                        ? candidate.brandPreference.filter(x => x !== b.id)
                        : [...candidate.brandPreference, b.id])}>
                      <span className="cp-brand-tag__dot" style={{ background: b.tokens.primary }}></span>
                      {b.name}
                      {active && <span className="cp-brand-tag__check">✓</span>}
                    </button>
                  );
                })}
              </div>
            </div>
            <Field label="Préférence de localisation" value={candidate.locationPreference} editable={editing}
              onChange={(v) => setField('locationPreference', v)} />

            <SectionLabel>Suivi interne</SectionLabel>
            <Field label="Notes internes (consultant uniquement)" value={candidate.internalNotes} multiline editable={editing}
              onChange={(v) => setField('internalNotes', v)} />
            <Field label="Statut général" value={candidate.generalStatus} editable={editing}
              onChange={(v) => setField('generalStatus', v)} />

            <SectionLabel>Documents</SectionLabel>
            <div className="cp-docs">
              {['CV', 'Pièce d\'identité', 'Justificatif de revenus', 'Lettre de motivation', 'Pré-accord bancaire'].map((d, i) => (
                <div key={i} className="cp-doc">
                  <span>{d}</span>
                  <span className={i < 3 ? 'cp-doc__ok' : 'cp-doc__pending'}>{i < 3 ? '✓ Reçu' : '○ À fournir'}</span>
                </div>
              ))}
              <button className="lp-btn lp-btn--ghost lp-btn--sm" style={{ marginTop: 8, alignSelf: 'flex-start' }}>+ Demander un document</button>
            </div>
          </section>

          {/* OPPORTUNITIES RIGHT */}
          <section>
            <div className="cp-opps-head">
              <div>
                <h2 className="cp-card__title" style={{ margin: 0 }}>Opportunités liées</h2>
                <p className="cp-card__sub">{candidate.opportunities.length} opportunités · un candidat peut être lié à plusieurs projets</p>
              </div>
              <button className="lp-btn lp-btn--ghost lp-btn--sm" onClick={() => setCompareOpen(true)}>
                Comparer les opportunités
              </button>
            </div>

            <div className="cp-opps">
              {candidate.opportunities.map(o => {
                const opp = FG.ONBOARDING_OPPORTUNITIES.find(x => x.id === o.opportunityId);
                const brand = FG.brandById(o.brand);
                const status = FG.OPP_VALIDATION_STATUSES.find(s => s.id === o.validationStatus);
                return (
                  <article key={o.id} className={'cp-opp cp-opp--' + status.tone}>
                    <header className="cp-opp__head">
                      <span className="cp-opp__brand-dot" style={{ background: brand.tokens.primary }}></span>
                      <div className="cp-opp__title-block">
                        <p className="cp-opp__brand">{brand.name}</p>
                        <h3 className="cp-opp__title">{opp?.name || 'Opportunité'}</h3>
                      </div>
                      <span className={'cp-opp__status cp-opp__status--' + status.tone}>{status.label}</span>
                    </header>
                    <div className="cp-opp__meta">
                      <span>{o.projectType}</span>
                      <span>·</span>
                      <span>{o.location}</span>
                    </div>
                    <div className="cp-opp__fit">
                      <p className="cp-opp__fit-l">Score d'adéquation</p>
                      <div className="cp-opp__fit-bar">
                        <div className="cp-opp__fit-fill" style={{ width: `${o.fitScore}%`, background: o.fitScore >= 75 ? '#2d6a4f' : o.fitScore >= 55 ? '#9c6a1f' : '#9c2a1f' }}></div>
                      </div>
                      <span className="cp-opp__fit-val">{o.fitScore} / 100</span>
                    </div>
                    <p className="cp-opp__notes">{o.consultantNotes}</p>
                    <details className="cp-opp__details">
                      <summary>Historique des échanges ({o.history.length})</summary>
                      <ul className="cp-opp__history">
                        {o.history.map((h, i) => (
                          <li key={i}>
                            <span className="cp-opp__hist-when">{h.at}</span>
                            <span className="cp-opp__hist-author">{h.author}</span>
                            <span className="cp-opp__hist-body">{h.body}</span>
                          </li>
                        ))}
                      </ul>
                      <div className="cp-opp__history-docs">
                        <p>Documents liés ({o.documents.length}):</p>
                        <div>{o.documents.length === 0 ? <em>Aucun</em> : o.documents.map((d, i) => <span key={i} className="cp-opp__doc-pill">{d}</span>)}</div>
                      </div>
                    </details>
                    {!hasValidated && o.validationStatus !== 'validated' && o.validationStatus !== 'rejected' && (
                      <div className="cp-opp__actions">
                        <select value={o.validationStatus} onChange={(e) => setOpp(o.id, 'validationStatus', e.target.value)}>
                          {FG.OPP_VALIDATION_STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                        </select>
                        <button className="lp-btn lp-btn--primary lp-btn--sm" onClick={() => validateOpp(o.id)}>
                          Valider cette opportunité
                        </button>
                      </div>
                    )}
                    {o.validationStatus === 'validated' && (
                      <div className="cp-opp__validated">
                        ✓ Cette opportunité est lancée officiellement · workflow candidat actif
                        <a href={'candidate.html?lead=lead-001'} className="lp-btn lp-btn--ghost lp-btn--sm" style={{ marginLeft: 'auto' }}>Voir l'espace candidat →</a>
                      </div>
                    )}
                  </article>
                );
              })}
            </div>
          </section>
        </div>
      </main>

      {compareOpen && <CompareModal candidate={candidate} onClose={() => setCompareOpen(false)} onValidate={(id) => { validateOpp(id); setCompareOpen(false); }} />}
    </div>
  );
}

function Field({ label, value, multiline, editable, onChange }) {
  return (
    <div className="cp-field">
      <p className="cp-field__l">{label}</p>
      {editable ? (
        multiline
          ? <textarea value={value} rows={3} onChange={(e) => onChange(e.target.value)} />
          : <input type="text" value={value} onChange={(e) => onChange(e.target.value)} />
      ) : (
        <p className="cp-field__v">{value}</p>
      )}
    </div>
  );
}

function FieldSelect({ label, value, displayed, editable, options, onChange }) {
  return (
    <div className="cp-field">
      <p className="cp-field__l">{label}</p>
      {editable ? (
        <select value={value} onChange={(e) => onChange(e.target.value)}>
          {options.map(o => <option key={o.value} value={o.value}>{o.label}</option>)}
        </select>
      ) : (
        <p className="cp-field__v">{displayed || value}</p>
      )}
    </div>
  );
}

function SectionLabel({ children }) {
  return <p className="cp-section-label">{children}</p>;
}

// Compare modal — side-by-side comparison of opportunities
function CompareModal({ candidate, onClose, onValidate }) {
  const opps = candidate.opportunities.filter(o => o.validationStatus !== 'rejected' && o.validationStatus !== 'on-hold');
  return (
    <>
      <div className="lp-scrim" onClick={onClose}></div>
      <div className="lp-modal lp-modal--wide" role="dialog">
        <header className="lp-modal__head">
          <div>
            <p className="lp-modal__eyebrow">Pré-analyse · consultant</p>
            <h2 className="lp-modal__title">Comparer les opportunités</h2>
            <p className="lp-modal__sub">Identifiez celle qui correspond le mieux au candidat avant de lancer le workflow.</p>
          </div>
          <button className="lp-modal__close" onClick={onClose}><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
        </header>
        <div className="cp-compare">
          <div className="cp-compare__grid" style={{ gridTemplateColumns: `repeat(${opps.length}, 1fr)` }}>
            {opps.map(o => {
              const opp = FG.ONBOARDING_OPPORTUNITIES.find(x => x.id === o.opportunityId);
              const brand = FG.brandById(o.brand);
              const status = FG.OPP_VALIDATION_STATUSES.find(s => s.id === o.validationStatus);
              return (
                <div key={o.id} className="cp-compare__col">
                  <div className="cp-compare__header" style={{ background: brand.tokens.primary, color: '#fff' }}>
                    <p style={{ fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase', margin: 0, opacity: 0.85 }}>{brand.name}</p>
                    <p style={{ fontSize: 16, fontWeight: 600, margin: '4px 0 0' }}>{opp?.name}</p>
                  </div>
                  <div className="cp-compare__rows">
                    <Row k="Type" v={o.projectType} />
                    <Row k="Localisation" v={o.location} />
                    <Row k="Investissement requis" v={FG.fmtEur(opp.requiredInvest)} />
                    <Row k="Apport candidat" v={FG.fmtEur(opp.candidateContrib)} />
                    <Row k="Budget candidat" v={FG.fmtEur(candidate.budget)} highlight={candidate.budget >= opp.candidateContrib ? 'ok' : 'warn'} />
                    <Row k="Région candidat" v={FG.REGIONS.find(r => r.id === candidate.preferredRegion)?.label}
                      highlight={opp.region === candidate.preferredRegion ? 'ok' : 'warn'} />
                    <Row k="Marque préférée" v={candidate.brandPreference.includes(o.brand) ? 'Oui' : 'Non'}
                      highlight={candidate.brandPreference.includes(o.brand) ? 'ok' : 'warn'} />
                    <Row k="Statut" v={status.label} />
                    <div className="cp-compare__fit">
                      <span style={{ fontWeight: 600, fontSize: 22 }}>{o.fitScore}</span>
                      <span style={{ fontSize: 11, color: 'rgba(14,27,40,0.55)' }}>/100 fit score</span>
                    </div>
                    <p style={{ fontSize: 12, color: 'rgba(14,27,40,0.65)', fontStyle: 'italic', margin: '8px 0 12px' }}>{o.consultantNotes}</p>
                    <button className="lp-btn lp-btn--primary lp-btn--sm" style={{ width: '100%' }} onClick={() => onValidate(o.id)}>
                      Valider cette opportunité
                    </button>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
        <div className="lp-modal__actions" style={{ borderTop: '0.5px solid rgba(14,27,40,0.06)', padding: '14px 24px' }}>
          <button className="lp-btn lp-btn--ghost" onClick={onClose}>Fermer</button>
        </div>
      </div>
    </>
  );
}

function Row({ k, v, highlight }) {
  return (
    <div className="cp-compare__row">
      <span className="cp-compare__row-k">{k}</span>
      <span className={'cp-compare__row-v' + (highlight === 'ok' ? ' is-ok' : highlight === 'warn' ? ' is-warn' : '')}>{v}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
