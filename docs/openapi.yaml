                  brands:
                    type: array
                    items:
                      type: object
                      properties:
                        brandId:
                          type: string
                        newLeads:
                          type: integer
                        openOpportunities:
                          type: integer
                  investors:
                    type: object
                    properties:
                      total:
                        type: integer
                      newThisPeriod:
                        type: integer
                      totalInvested:
                        type: number
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

