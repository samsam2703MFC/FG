  # =========================================================================
  /backoffice/dashboard:
    get:
      tags: [Backoffice]
      summary: Get backoffice dashboard
      description: Returns a comprehensive admin overview — active leads, pending documents, open tickets, recent registrations.
      responses:
        '200':
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
                properties:
                  activeCandidates:
                    type: integer
