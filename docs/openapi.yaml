          description: Array of priority levels
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: normal
                    label:
                      type: string
                      example: Normale
              example:
                - id: low
                  label: Faible
                - id: normal
                  label: Normale
                - id: high
                  label: Élevée
                - id: urgent
