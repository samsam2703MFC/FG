openapi: 3.0.3
info:
  title: Franchise Generation API
  description: |
    Backend API for the Franchise Generation multi-brand franchise ecosystem.
    Handles candidates, investors, developers, brands, opportunities, onboarding journeys, and CRM.

    **Demo credentials** (password: `password`):
    - Admin → `admin@fg.be`
    - Consultant → `sophie.renard@fg.be`
    - Investor → `claire.vermeulen@example.com`
  version: 1.0.0
  contact:
    name: FG Platform Team
    email: admin@fg.be

servers:
  - url: http://localhost:3001
    description: Local development

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:   { type: string }
        code:    { type: string }
        details: { type: array, items: { type: object } }

    Token:
      type: object
      properties:
        token: { type: string }
        user:
          type: object
          properties:
            id:           { type: string }
            email:        { type: string }
            role:         { type: string, enum: [admin, consultant, investor] }
            name:         { type: string }
            active:       { type: boolean }

    Brand:
      type: object
      properties:
        id:           { type: string }
        name:         { type: string }
        tagline:      { type: string }
        kind:         { type: string }
        city:         { type: string }
        headquarters: { type: string }
        founded:      { type: integer }
        established:  { type: string }
        logoSrc:      { type: string }
        logoMark:     { type: string }
        theme:        { type: string }
        tokens:
          type: object
          properties:
            primary:     { type: string }
            secondary:   { type: string }
            ink:         { type: string }
            bg:          { type: string }
            surface:     { type: string }
            accent:      { type: string }
            fontDisplay: { type: string }
            fontUi:      { type: string }
            fontAccent:  { type: string }

    Opportunity:
      type: object
      properties:
        id:            { type: string }
        brand:         { type: string }
        name:          { type: string }
        city:          { type: string }
        region:        { type: string, nullable: true }
        format:        { type: string }
        opening:       { type: string, nullable: true }
        status:        { type: string, enum: [En recherche candidat, Pré-lancement, Closing imminent, Co-investissement ouvert, closed-won] }
        budget:        { type: number, nullable: true }
        ticketMin:     { type: number, nullable: true }
        ticketMax:     { type: number, nullable: true }
        roiTarget:     { type: number, nullable: true }
        developerId:   { type: string, nullable: true }
        locationId:    { type: string, nullable: true }
        targetOpenDate: { type: string, nullable: true }
        createdAt:     { type: string, format: date-time }

    Candidate:
      type: object
      properties:
        id:               { type: string }
        firstName:        { type: string }
        lastName:         { type: string }
        email:            { type: string }
        phone:            { type: string, nullable: true }
        address:          { type: string, nullable: true }
        preferredRegion:  { type: string, nullable: true }
        language:         { type: string, nullable: true }
        experience:       { type: string, nullable: true }
        currentSituation: { type: string, nullable: true }
        motivation:       { type: string, nullable: true }
        budget:           { type: number, nullable: true }
        financingCapacity: { type: string, nullable: true }
        brandPreference:  { type: array, items: { type: string } }
        generalStatus:    { type: string }
        createdAt:        { type: string, format: date-time }

    Lead:
      type: object
      properties:
        id:          { type: string }
        candidate:
          type: object
          properties:
            name:  { type: string }
            email: { type: string }
            phone: { type: string, nullable: true }
        opportunity: { type: string }
        currentStep: { type: string }
        priority:    { type: string, enum: [high, normal, low] }
        source:      { type: string }
        status:      { type: string }
        notes:       { type: string, nullable: true }
        nextAction:  { type: string, nullable: true }
        assignedTo:
          type: object
          nullable: true
          properties:
            id:   { type: string }
            name: { type: string }
        createdAt:   { type: string, format: date-time }

    Investor:
      type: object
      properties:
        id:              { type: string }
        name:            { type: string }
        initials:        { type: string }
        email:           { type: string }
        phone:           { type: string, nullable: true }
        type:            { type: string, enum: [individual, entity] }
        role:            { type: string }
        tier:            { type: string, enum: [Pilot, Standard, Privilège, Premium] }
        investmentClass: { type: string, enum: [A, B, C, D], nullable: true }
        amountCommitted: { type: number }
        status:          { type: string, enum: [prospect, signed, funded] }
        brands:          { type: array, items: { type: string } }
        totalInvested:   { type: number }
        totalRepaid:     { type: number }
        since:           { type: string }
        createdAt:       { type: string, format: date-time }

    Developer:
      type: object
      properties:
        id:          { type: string }
        name:        { type: string }
        contactName: { type: string }
        email:       { type: string }
        phone:       { type: string, nullable: true }
        type:        { type: string }
        regions:     { type: array, items: { type: string } }
        status:      { type: string, enum: [active, pending, inactive, rejected, archived] }
        locations:
          type: array
          items:
            type: object
            properties:
              id:           { type: string }
              address:      { type: string }
              surface:      { type: string }
              type:         { type: string }
              availability: { type: string }
              rent:         { type: number }
              status:       { type: string }
        submittedAt: { type: string, format: date-time }

    OnboardingRecord:
      type: object
      properties:
        id:              { type: string }
        opportunityId:   { type: string }
        opportunityName: { type: string }
        opportunityCity: { type: string, nullable: true }
        candidateId:     { type: string }
        candidateName:   { type: string }
        candidateEmail:  { type: string, nullable: true }
        candidatePhone:  { type: string, nullable: true }
        brand:           { type: string }
        targetOpenDate:  { type: string, nullable: true }
        stage:           { type: string }
        currentStepCode: { type: string }
        validatedBy:     { type: string }
        status:          { type: string, enum: [active, completed, suspended] }
        createdAt:       { type: string, format: date-time }

    CrmTask:
      type: object
      properties:
        id:            { type: string }
        type:          { type: string }
        candidateId:   { type: string }
        candidateName: { type: string }
        opportunityId: { type: string }
        assignedTo:    { type: string }
        status:        { type: string, enum: [pending, done, cancelled] }
        dueAt:         { type: string, format: date-time }
        createdAt:     { type: string, format: date-time }
        note:          { type: string }

    Meta:
      type: object
      properties:
        total: { type: integer }
        page:  { type: integer }
        limit: { type: integer }
        pages: { type: integer }

tags:
  - name: Auth
    description: Authentication and user profile
  - name: Brands
    description: Brand management
  - name: Opportunities
    description: Franchise opportunities
  - name: Candidates
    description: Candidate profiles and pipeline
  - name: Investors
    description: Investor management
  - name: Developers
    description: Real-estate developers and locations
  - name: Consultants
    description: Consultant profiles and leads
  - name: Leads
    description: CRM lead management
  - name: Onboarding
    description: Franchise onboarding journeys
  - name: Backoffice
    description: Admin dashboard and internal data
  - name: Shops
    description: Active franchise shops
  - name: Documents
    description: Document management
  - name: Notifications
    description: User notifications
  - name: Support
    description: Support tickets and messaging
  - name: Regions
    description: Geographic regions
  - name: Landing
    description: Public landing page content

paths:

  # ─────────────────────────────────────────────────────────────
  # AUTH
  # ─────────────────────────────────────────────────────────────
  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login and obtain JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:    { type: string, format: email, example: admin@fg.be }
                password: { type: string, example: password }
      responses:
        '200':
          description: JWT token and user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Token' }
        '401': { description: Invalid credentials }

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout (invalidate session)
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:           { type: string }
                      email:        { type: string }
                      name:         { type: string }
                      role:         { type: string }
                      investorId:   { type: string, nullable: true }
                      consultantId: { type: string, nullable: true }
    put:
      tags: [Auth]
      summary: Update current user profile
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:  { type: string, minLength: 2, maxLength: 100 }
                phone: { type: string }
                email: { type: string, format: email }
      responses:
        '200': { description: Updated profile }

  /api/auth/me/preferences:
    get:
      tags: [Auth]
      summary: Get investor preferences (investor only)
      responses:
        '200':
          description: Investor preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      investorId:       { type: string }
                      notifications:    { type: object }
                      preferredBrands:  { type: array, items: { type: string } }
                      preferredRegions: { type: array, items: { type: string } }
                      riskProfile:      { type: string, enum: [conservative, moderate, aggressive] }
                      currency:         { type: string }
                      language:         { type: string }
    put:
      tags: [Auth]
      summary: Update investor preferences (investor only)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notifications:    { type: object }
                preferredBrands:  { type: array, items: { type: string } }
                preferredRegions: { type: array, items: { type: string } }
                riskProfile:      { type: string, enum: [conservative, moderate, aggressive] }
                currency:         { type: string, minLength: 3, maxLength: 3 }
                language:         { type: string, minLength: 2, maxLength: 5 }
      responses:
        '200': { description: Updated preferences }

  # ─────────────────────────────────────────────────────────────
  # BRANDS
  # ─────────────────────────────────────────────────────────────
  /api/brands:
    get:
      tags: [Brands]
      summary: List all brands
      security: []
      parameters:
        - in: query
          name: status
          schema: { type: string }
          description: Filter by brand status
      responses:
        '200':
          description: List of brands
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Brand' } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Brands]
      summary: Create a new brand (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:           { type: string, example: "La Nouvelle Enseigne" }
                slug:           { type: string }
                tagline:        { type: string }
                kind:           { type: string, example: "Boulangerie · Café" }
                city:           { type: string, example: "Bruxelles" }
                headquarters:   { type: string }
                yearFounded:    { type: integer }
                legalName:      { type: string }
                countryOfOrigin: { type: string, example: "BE" }
                status:         { type: string, enum: [in-development, active, archived] }
                tokens:         { type: object }
                isDraft:        { type: boolean }
                brandManager:   { type: string }
                internalNotes:  { type: string }
      responses:
        '201':
          description: Brand created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: object }
                  message: { type: string }
        '409': { description: Brand slug already exists }

  /api/brands/share-classes:
    get:
      tags: [Brands]
      summary: List share class definitions
      security: []
      responses:
        '200':
          description: Share classes
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:                   { type: string, enum: [A, B, C, D] }
                        label:                { type: string }
                        description:          { type: string }
                        votingMultiplier:     { type: integer }
                        dividendPriority:     { type: integer }
                        liquidationPriority:  { type: integer }
                        transferRestrictions: { type: string }
                        notes:                { type: string }

  /api/brands/{id}:
    get:
      tags: [Brands]
      summary: Get a single brand
      security: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: string }, example: atelier }
      responses:
        '200': { description: Brand object with portfolio summary }
        '404': { description: Brand not found }
    put:
      tags: [Brands]
      summary: Update a brand (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:          { type: string }
                tagline:       { type: string }
                kind:          { type: string }
                city:          { type: string }
                headquarters:  { type: string }
                yearFounded:   { type: integer }
                status:        { type: string }
                tokens:        { type: object }
                logoSrc:       { type: string }
                isDraft:       { type: boolean }
                brandManager:  { type: string }
                internalNotes: { type: string }
      responses:
        '200': { description: Updated brand }
        '404': { description: Brand not found }
    delete:
      tags: [Brands]
      summary: Archive a brand (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Brand archived }
        '404': { description: Brand not found }

  /api/brands/{id}/full:
    get:
      tags: [Brands]
      summary: Get full brand record with all 8 sections (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Full brand record }

  /api/brands/{id}/presentation:
    get:
      tags: [Brands]
      summary: Get brand CMS presentation
      security: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Brand and presentation object }

  /api/brands/{id}/shops:
    get:
      tags: [Brands]
      summary: List shops for a brand
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Shop list }

  /api/brands/{id}/opportunities:
    get:
      tags: [Brands]
      summary: List financing opportunities for a brand
      security: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Opportunity list }

  /api/brands/{id}/team:
    get:
      tags: [Brands]
      summary: Get brand team members
      security: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Team list }

  /api/brands/{id}/documents:
    get:
      tags: [Brands]
      summary: List documents for a brand
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Document list }

  /api/brands/{id}/portfolio:
    get:
      tags: [Brands]
      summary: Get brand portfolio summary
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Portfolio data }

  # ─────────────────────────────────────────────────────────────
  # OPPORTUNITIES
  # ─────────────────────────────────────────────────────────────
  /api/opportunities:
    get:
      tags: [Opportunities]
      summary: List all opportunities
      security: []
      parameters:
        - { in: query, name: brand,  schema: { type: string } }
        - { in: query, name: region, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: type,   schema: { type: string, enum: [onboarding, financing, all] }, description: "Default: all" }
        - { in: query, name: page,   schema: { type: integer, default: 1 } }
        - { in: query, name: limit,  schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Opportunity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Opportunity' } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Opportunities]
      summary: Create a new onboarding opportunity (admin/consultant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [brand, name, city]
              properties:
                brand:      { type: string, example: atelier }
                name:       { type: string, minLength: 2, maxLength: 200, example: "L'Atelier By Saint-Gilles" }
                city:       { type: string, minLength: 2, maxLength: 100, example: "Bruxelles" }
                region:     { type: string }
                format:     { type: string, example: Boutique }
                opening:    { type: string, example: "Q3 2026" }
                status:     { type: string, enum: [En recherche candidat, Pré-lancement, Closing imminent, Co-investissement ouvert] }
                budget:     { type: number }
                ticketMin:  { type: number }
                ticketMax:  { type: number }
                roiTarget:  { type: number }
                developerId: { type: string }
                locationId:  { type: string }
      responses:
        '201':
          description: Opportunity created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Opportunity' }

  /api/opportunities/validation-statuses:
    get:
      tags: [Opportunities]
      summary: List validation status definitions
      security: []
      responses:
        '200': { description: Validation statuses }

  /api/opportunities/{id}:
    get:
      tags: [Opportunities]
      summary: Get a single opportunity
      security: []
      parameters:
        - { in: path, name: id, required: true, schema: { type: string }, example: op-bxl-cookies }
      responses:
        '200': { description: Opportunity with brandDetail }
        '404': { description: Not found }

  /api/opportunities/{id}/interest:
    post:
      tags: [Opportunities]
      summary: Express investor interest in an opportunity
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:  { type: number }
                message: { type: string, maxLength: 1000 }
      responses:
        '201': { description: Interest recorded }

  /api/opportunities/{id}/candidates:
    get:
      tags: [Opportunities]
      summary: List candidate leads for an opportunity (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Candidate lead list }

  /api/opportunities/{id}/interests:
    get:
      tags: [Opportunities]
      summary: List investor interests for an opportunity (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Investor interest list }

  /api/opportunities/{id}/validate:
    post:
      tags: [Opportunities]
      summary: Validate a candidate — close opportunity and start onboarding (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string }, example: op-bxl-cookies }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [candidateId]
              properties:
                candidateId: { type: string, example: lead-001, description: "ID of the winning candidate lead" }
      responses:
        '200':
          description: Opportunity closed, onboarding started
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      onboardingRecord: { $ref: '#/components/schemas/OnboardingRecord' }
                      crmTasksCreated: { type: integer }
                      opportunity:
                        type: object
                        properties:
                          id:                   { type: string }
                          status:               { type: string }
                          validatedCandidateId: { type: string }
                          validatedAt:          { type: string, format: date-time }
                  message: { type: string }
        '404': { description: Opportunity or candidate not found }
        '409': { description: Opportunity already closed }

  # ─────────────────────────────────────────────────────────────
  # CANDIDATES
  # ─────────────────────────────────────────────────────────────
  /api/candidates:
    get:
      tags: [Candidates]
      summary: List candidates (admin/consultant)
      parameters:
        - { in: query, name: brand,  schema: { type: string } }
        - { in: query, name: region, schema: { type: string } }
        - { in: query, name: status, schema: { type: string } }
        - { in: query, name: search, schema: { type: string } }
        - { in: query, name: page,   schema: { type: integer, default: 1 } }
        - { in: query, name: limit,  schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Candidate list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Candidate' } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Candidates]
      summary: Create a candidate profile (admin/consultant)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [firstName, lastName, email]
              properties:
                firstName:        { type: string, minLength: 1, maxLength: 100, example: Marie }
                lastName:         { type: string, minLength: 1, maxLength: 100, example: Lemoine }
                email:            { type: string, format: email }
                phone:            { type: string }
                budget:           { type: number }
                preferredRegion:  { type: string }
                brandPreference:  { type: array, items: { type: string } }
                address:          { type: string }
                language:         { type: string }
                experience:       { type: string }
                currentSituation: { type: string }
                motivation:       { type: string }
                financingCapacity: { type: string }
                locationPreference: { type: string }
                internalNotes:    { type: string }
                generalStatus:    { type: string, example: "En pré-analyse" }
      responses:
        '201':
          description: Candidate created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Candidate' }
        '409': { description: Email already exists }

  /api/candidates/{id}:
    get:
      tags: [Candidates]
      summary: Get a single candidate with leads (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Candidate with leads array }
        '404': { description: Not found }
    put:
      tags: [Candidates]
      summary: Update a candidate (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
