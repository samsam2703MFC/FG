# ---------------------------------------------------------------------------
# COMPONENTS
# ---------------------------------------------------------------------------
components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: Resource identifier

    brandId:
      name: id
      in: path
      required: true
      schema:
        type: string
        enum: [atelier, couq, cookies, mania]
      description: Brand identifier

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: VALIDATION_ERROR
            message: Request validation failed.
            details:
              - field: email
                message: Must be a valid email address.

    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: UNAUTHORIZED
            message: A valid Bearer token is required.

    Forbidden:
      description: Authenticated but insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: FORBIDDEN
            message: You do not have permission to access this resource.

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: NOT_FOUND
            message: The requested resource was not found.

    InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            error: INTERNAL_ERROR
            message: An unexpected error occurred. Please try again.

  schemas:

    # -------------------------------------------------------------------------
    Brand:
      type: object
      description: A franchise brand in the FG ecosystem
      properties:
        id:
          type: string
          example: atelier
          description: Unique slug identifier
        name:
          type: string
          example: "L'Atelier By"
        tagline:
          type: string
          example: "Boulangerie de quartier · Belgique"
        kind:
          type: string
          example: "Boulangerie · Pâtisserie"
          description: Category / concept type
        city:
          type: string
          example: Bruxelles
        headquarters:
          type: string
          example: "Bruxelles, BE"
        founded:
          type: integer
          example: 2022
        established:
          type: string
          example: "5 magasins"
          description: Human-readable network size
        logoSrc:
          type: string
          format: uri
          nullable: true
          example: "img/logo.png"
        logoMark:
          type: string
          example: A
          description: Single character or symbol used as a fallback logo mark
        theme:
          type: string
          example: atelier
          description: CSS theme class applied when displaying this brand
        tokens:
          $ref: '#/components/schemas/BrandTokens'
        kpiLabels:
          type: object
          properties:
            ca:
              type: string
            profit:
              type: string
            cust:
              type: string
            basket:
              type: string
        copy:
          type: object
          properties:
            ecoNoun:
              type: string
              example: magasin
            ecoNounPlural:
              type: string
              example: magasins
            verdict:
              type: string
              example: "Sur la trajectoire"

    # -------------------------------------------------------------------------
    BrandTokens:
      type: object
      description: Brand design system tokens (colors, typography)
      properties:
        primary:
          type: string
          example: "#8D1D2C"
        secondary:
          type: string
          example: "#F2C9A0"
        ink:
          type: string
          example: "#1c1a17"
        bg:
          type: string
          example: "#EAE4DC"
        surface:
          type: string
          example: "#FFFFFF"
        accent:
          type: string
          example: "#8D1D2C"
        fontDisplay:
          type: string
          example: '"DM Sans", system-ui, sans-serif'
        fontUi:
          type: string
          example: '"DM Sans", system-ui, sans-serif'
        fontAccent:
          type: string
          example: '"DM Sans", system-ui, sans-serif'

    # -------------------------------------------------------------------------
    BrandPresentation:
      type: object
      description: Full CMS-managed investor presentation for a brand
      properties:
        hero:
          type: object
          properties:
            baseline:
              type: string
              example: "La boulangerie de quartier, au geste artisanal."
            concept:
              type: string
            message:
              type: string
            cta:
              type: string
            secondaryCta:
              type: string
            media:
              type: string
              format: uri
              nullable: true
        carousel:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
                enum: [image, kpi, concept, text, highlight]
              src:
                type: string
                nullable: true
              caption:
                type: string
                nullable: true
              title:
                type: string
                nullable: true
              body:
                type: string
                nullable: true
              metrics:
                type: array
                nullable: true
                items:
                  type: object
                  properties:
                    label:
                      type: string
                    value:
                      type: string
        videos:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
                enum: [main, founder, tour]
              thumb:
                type: string
                nullable: true
              title:
                type: string
              desc:
                type: string
              duration:
                type: string
        concept:
          type: object
          properties:
            explanation:
              type: string
            targetCustomers:
              type: array
              items:
                type: string
            positioning:
              type: string
            strengths:
              type: array
              items:
                type: object
                properties:
                  title:
                    type: string
                  body:
                    type: string
            franchiseModel:
              type: string
            vision:
              type: string
        investment:
          type: object
          properties:
            minTicket:
              type: integer
              example: 5000
            roiTarget:
              type: number
              example: 8.4
            payback:
              type: string
              example: "4,8 ans"
            openOpps:
              type: integer
              example: 1
            networkSize:
              type: integer
              example: 47
            networkPerfLabel:
              type: string
              example: "+8,4 % CA moyen vs budget 2025"
        documents:
          type: array
          items:
            type: object
            properties:
              kind:
                type: string
              title:
                type: string
              size:
                type: string
              url:
                type: string
                format: uri
                nullable: true
        team:
          type: array
          items:
            type: object
            properties:
              role:
                type: string
              person:
                type: object
                properties:
                  name:
                    type: string
                  desc:
                    type: string
                  contact:
                    type: boolean
        opportunitiesPitch:
          type: string

    # -------------------------------------------------------------------------
    Shop:
      type: object
      description: A physical franchise shop location
      properties:
        id:
          type: string
          example: couq-chatelain
        brandId:
          type: string
          example: couq
        name:
          type: string
          example: "Couq Châtelain"
        city:
          type: string
          example: Bruxelles
        kind:
          type: string
          example: Boulangerie
        regionId:
          type: string
          example: bxl
        address:
          type: string
          nullable: true
        surfaceM2:
          type: integer
          nullable: true
        opened:
          type: string
          example: "Juin 2024"
        status:
          type: string
          enum: [open, pre-opening, closed, paused]
        health:
          type: string
          enum: [good, at-risk, critical]
          example: good
        photoUrl:
          type: string
          format: uri
          nullable: true
        kpiSnapshot:
          type: object
          properties:
            ca:
              type: integer
              description: Monthly revenue in EUR
            profit:
              type: number
              description: Net profit margin percentage
            cust:
              type: integer
              description: Average customers per day
            basket:
              type: number
              description: Average basket in EUR
            vsBudget:
              type: number
              description: Revenue vs budget percentage
        consultant:
          type: object
          nullable: true
          properties:
            name:
              type: string
            lastVisit:
              type: string
            verdict:
              type: string
              enum: [on-track, at-risk, critical]
            summary:
              type: string
            action:
              type: string
        franchisee:
          type: object
          nullable: true
          properties:
            name:
              type: string
            tier:
              type: string
            overall:
              type: number
            since:
              type: string

    # -------------------------------------------------------------------------
    Opportunity:
      type: object
      description: A franchise or investment opportunity on the marketplace
      properties:
        id:
          type: string
          example: op-gent
        brand:
          type: string
          example: atelier
        name:
          type: string
          example: "L'Atelier Gand"
        city:
          type: string
          example: Gent
        region:
          type: string
          example: fla
        format:
          type: string
          example: "Boutique 84 m²"
        openingDate:
          type: string
          example: "Q3 2026"
        requiredInvest:
          type: integer
          example: 320000
          description: Total investment required in EUR
        candidateContrib:
          type: integer
          example: 60000
          description: Candidate personal contribution in EUR
        financingNeed:
          type: string
          example: "Tax shelter + prêt investisseur"
        payback:
          type: string
          example: "4,8 ans"
        status:
          type: string
          example: "Closing imminent"
        description:
          type: string
        imageUrl:
          type: string
          format: uri
          nullable: true
        type:
          type: string
          enum: [franchise, investment, new-brand]
        target:
          type: integer
          nullable: true
          description: Total fundraising target in EUR
        raised:
          type: integer
          nullable: true
          description: Amount raised to date in EUR
        ticketMin:
          type: integer
          nullable: true
          description: Minimum investment ticket in EUR
        roiTarget:
          type: number
          nullable: true
        closingDays:
          type: integer
          nullable: true
          description: Days remaining until closing
        risk:
          type: string
          nullable: true
          enum: [Faible, Modéré, Élevé]
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    Candidate:
      type: object
      description: A franchise candidate profile
      properties:
        id:
          type: string
          example: cand-001
        firstName:
          type: string
          example: Marie
        lastName:
          type: string
          example: Lemoine
        email:
          type: string
          format: email
        phone:
          type: string
          example: "+32 478 11 22 33"
        address:
          type: string
        preferredRegion:
          type: string
          example: bxl
        language:
          type: string
          example: "Français · Néerlandais (B2) · Anglais (C1)"
        experience:
          type: string
        currentSituation:
          type: string
          example: "En poste · disponible à 3 mois"
        motivation:
          type: string
        budget:
          type: integer
          description: Personal capital contribution in EUR
          example: 75000
        financingCapacity:
          type: string
        brandPreference:
          type: array
          items:
            type: string
          example: [cookies, couq]
        locationPreference:
          type: string
        generalStatus:
          type: string
          enum: [to-analyse, in-discussion, recommended, validated, rejected, on-hold]
          example: "En pré-analyse"
        internalNotes:
          type: string
          description: Consultant-only notes (not shown to candidate)
        createdAt:
          type: string
          format: date-time

    CandidateCreate:
      type: object
      required: [firstName, lastName, email, phone, preferredRegion, budget]
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        phone:
          type: string
        address:
          type: string
        preferredRegion:
          type: string
        language:
          type: string
        experience:
          type: string
        currentSituation:
          type: string
        motivation:
          type: string
        budget:
          type: integer
        financingCapacity:
          type: string
        brandPreference:
          type: array
          items:
            type: string
        locationPreference:
          type: string

    # -------------------------------------------------------------------------
    CandidateLead:
      type: object
      description: A link between a candidate and a specific opportunity, tracked through the pipeline
      properties:
        id:
          type: string
          example: opp-link-001
        candidateId:
          type: string
          example: cand-001
        opportunityId:
          type: string
          example: op-bxl-cookies
        brand:
          type: string
          example: cookies
        projectType:
          type: string
          example: Kiosque
        location:
          type: string
          example: "Bruxelles · Galerie Toison d'Or"
        validationStatus:
          type: string
          enum: [to-analyse, in-discussion, recommended, validated, rejected, on-hold]
