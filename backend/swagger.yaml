      responses:
        '200':
          description: Developer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/Developer' } }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [Developers]
      summary: Submit a new developer (public — pending review)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, contactName, email]
              properties:
                name:        { type: string, minLength: 2, maxLength: 200, example: "Immo Bruxelles SPRL" }
                contactName: { type: string, minLength: 2, maxLength: 100, example: "Marc Lejeune" }
                email:       { type: string, format: email }
                phone:       { type: string }
                type:        { type: string, example: master }
                regions:     { type: array, items: { type: string } }
                location:
                  type: object
                  properties:
                    address:      { type: string }
                    surface:      { type: string }
                    type:         { type: string }
                    availability: { type: string }
                    rent:         { type: number }
                    notes:        { type: string }
                notes: { type: string }
      responses:
        '201':
          description: Developer submitted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Developer' }

  /api/developers/{id}:
    get:
      tags: [Developers]
      summary: Get a single developer with locations (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Developer object }
        '404': { description: Not found }
    put:
      tags: [Developers]
      summary: Update a developer (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:      { type: string, enum: [active, pending, inactive, rejected] }
                name:        { type: string, minLength: 2, maxLength: 200 }
                contactName: { type: string, minLength: 2, maxLength: 100 }
                email:       { type: string, format: email }
                phone:       { type: string }
                type:        { type: string }
                regions:     { type: array, items: { type: string } }
                notes:       { type: string }
      responses:
        '200': { description: Updated developer }
    delete:
      tags: [Developers]
      summary: Archive a developer (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Developer archived }

  /api/developers/{id}/locations:
    get:
