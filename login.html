<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Franchise Generation — Sign in</title>
<link rel="stylesheet" href="fg.css" />
</head>
<body class="fg-mode">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="fg-data.js"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;
const FG = window.FG_DATA;

const PORTAL_TARGETS = {
  brand:     { label: 'Brand Portal',     tag: 'Manage your network',         dest: 'consultant.html' },
  candidate: { label: 'Candidate Portal', tag: 'Open your franchise',         dest: 'candidate.html' },
  investor:  { label: 'Investor Portal',  tag: 'Track your investments',      dest: 'index.html' },
  developer: { label: 'Developer Portal', tag: 'Propose locations & projects',dest: 'consultant.html' }
};

function App() {
  const params = new URLSearchParams(window.location.search);
  const [portal, setPortal] = useState(PORTAL_TARGETS[params.get('portal')] ? params.get('portal') : 'investor');
  const target = PORTAL_TARGETS[portal];
  const [email, setEmail] = useState('claire.vermeulen@example.com');
  const [code, setCode]   = useState('');
  const [phase, setPhase] = useState('email');

  const submit = (e) => {
    e.preventDefault();
    if (phase === 'email') { setPhase('code'); setCode('123456'); return; }
    window.location.href = target.dest;
  };

  return (
    <div className="lg">
      <a className="lg__logo" href="landing.html">
        <img src="img/fg-logo.png" alt="Franchise Generation" />
      </a>

      <main className="lg__main lg__main--centered">
        <section className="lg__card">
          <p className="lg__card-eyebrow">Sign in</p>
          <h2 className="lg__card-h">
            {phase === 'email' ? 'Welcome to Franchise Generation' : 'Enter your code'}
          </h2>
          <p className="lg__card-sub">
            {phase === 'email'
              ? 'We\'ll email you a one-time code to verify your access.'
              : `A 6-digit code was sent to ${email}.`}
          </p>

          <form onSubmit={submit} className="lg__form">
            {phase === 'email' ? (
              <div className="lg__field">
                <label>Email address</label>
                <input type="email" value={email} onChange={(e) => setEmail(e.target.value)} required autoFocus />
              </div>
            ) : (
              <div className="lg__field">
                <label>Verification code</label>
                <input type="text" inputMode="numeric" maxLength={6} value={code}
                  onChange={(e) => setCode(e.target.value.replace(/\D/g, ''))} required autoFocus />
                <p className="lg__hint">For the demo, the code is pre-filled. Hit Continue to enter the portal.</p>
              </div>
            )}

            <button type="submit" className="lg__cta">
              {phase === 'email' ? 'Continue with email' : 'Continue'}
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: 16, height: 16 }}><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>

            {phase === 'code' && (
              <button type="button" className="lg__back" onClick={() => setPhase('email')}>
                ← Use a different email
              </button>
            )}

            <div className="lg__alt">
              <span>or</span>
            </div>

            <button type="button" className="lg__sso">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: 16, height: 16 }}><rect x="3" y="3" width="8" height="8"/><rect x="13" y="3" width="8" height="8"/><rect x="3" y="13" width="8" height="8"/><rect x="13" y="13" width="8" height="8"/></svg>
              Continue with single sign-on
            </button>
          </form>

          <p className="lg__foot">
            Not a member yet? <a href="landing.html">Discover the network →</a>
          </p>
        </section>
      </main>

      <footer className="lg__copy">© 2026 Franchise Generation</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
