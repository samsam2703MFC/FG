<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Franchise Generation — Sign in</title>
<link rel="stylesheet" href="fg.css" />
</head>
<body class="fg-mode">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

// Demo users — match backend/data/seed.js USERS array
const DEMO_USERS = [
  { id: 'user-001', email: 'claire.vermeulen@example.com', name: 'Claire Vermeulen', role: 'investor',   portal: 'investor',   desc: 'Investor Portal'   },
  { id: 'user-002', email: 'marc.dubois@example.com',      name: 'Marc Dubois',      role: 'investor',   portal: 'investor',   desc: 'Investor Portal'   },
  { id: 'user-003', email: 'admin@fg.be',                  name: 'Admin FG',         role: 'admin',      portal: 'admin',      desc: 'Back Office'       },
  { id: 'user-004', email: 'sophie.renard@fg.be',          name: 'Sophie Renard',    role: 'consultant', portal: 'brand',      desc: 'Consultant Portal' },
  { id: 'user-005', email: 'karim.boulahia@fg.be',         name: 'Karim Boulahia',  role: 'consultant', portal: 'brand',      desc: 'Consultant Portal' },
  { id: 'user-006', email: 'lea.dupuis@example.com',       name: 'Léa Dupuis',       role: 'candidate',  portal: 'candidate',  desc: 'Candidate Portal'  },
  { id: 'user-007', email: 'tom.janssen@example.com',      name: 'Tom Janssen',      role: 'candidate',  portal: 'candidate',  desc: 'Candidate Portal'  },
];

const DEMO_GROUPS = [
  { key: 'investor',   label: 'Investor',   icon: '📈', color: '#8D1D2C' },
  { key: 'candidate',  label: 'Candidate',  icon: '🏪', color: '#B8862E' },
  { key: 'consultant', label: 'Consultant', icon: '🧭', color: '#2E6B8D' },
  { key: 'admin',      label: 'Admin',      icon: '⚙️', color: '#444'    },
];

const PORTAL_TARGETS = {
  brand:     { label: 'Brand Portal',      tag: 'Manage your network',          dest: 'consultant.html' },
  candidate: { label: 'Candidate Portal',  tag: 'Open your franchise',          dest: 'candidate.html' },
  investor:  { label: 'Investor Portal',   tag: 'Track your investments',       dest: 'index.html' },
  developer: { label: 'Developer Portal',  tag: 'Propose locations & projects', dest: 'consultant.html' },
  admin:     { label: 'Back Office',       tag: 'Admin & network management',   dest: 'backoffice.html' },
};

const ROLE_PORTAL = { investor: 'investor', admin: 'admin', consultant: 'brand', candidate: 'candidate' };

// Store auth in localStorage (7-day expiry)
function storeAuth(user, token) {
  localStorage.setItem('fg_auth', JSON.stringify({
    token: token || ('demo-' + Date.now()),
    user,
    expiresAt: Date.now() + 7 * 24 * 60 * 60 * 1000,
  }));
}

function App() {
  const params = new URLSearchParams(window.location.search);
  const initPortal = PORTAL_TARGETS[params.get('portal')] ? params.get('portal') : 'investor';
  const [portal, setPortal] = useState(initPortal);
  const target = PORTAL_TARGETS[portal];

  const [email, setEmail] = useState('');
  const [code, setCode]   = useState('');
  const [phase, setPhase] = useState('email'); // 'email' | 'code'
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const loginAs = (user) => {
    storeAuth(user);
    window.location.href = (PORTAL_TARGETS[ROLE_PORTAL[user.role]] || PORTAL_TARGETS.investor).dest;
  };

  const handleEmail = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    // Try API first; fall back silently to demo mode
    try {
      const r = await fetch('/api/auth/request-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
        signal: AbortSignal.timeout(3000),
      });
      if (!r.ok) throw new Error('API unavailable');
    } catch (_) {
      // Demo mode — code is pre-filled
    }

    setCode('');
    setPhase('code');
    setLoading(false);
  };

  const handleCode = async (e) => {
    e.preventDefault();
    setError('');
    setLoading(true);

    // 1. Try real API
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, code }),
        signal: AbortSignal.timeout(4000),
      });
      if (r.ok) {
        const { data } = await r.json();
        storeAuth(data.user, data.token);
        const dest = PORTAL_TARGETS[ROLE_PORTAL[data.user?.role] || portal].dest;
        window.location.href = dest;
        return;
      }
    } catch (_) {}

    // 2. Demo fallback — accept any 6-digit code
    if (!/^\d{6}$/.test(code)) {
      setError('Enter the 6-digit code (demo: 123456).');
      setLoading(false);
      return;
    }

    const match = DEMO_USERS.find(u => u.email.toLowerCase() === email.toLowerCase());
    const user = match || {
      id: 'user-guest',
      email,
      name: email.split('@')[0],
      role: portal === 'investor' ? 'investor' : 'candidate',
    };

    storeAuth(user);
    window.location.href = target.dest;
  };

  const submit = phase === 'email' ? handleEmail : handleCode;

  return (
    <div className="lg">
      <a className="lg__logo" href="landing.html">
        <img src="img/fg-logo.png" alt="Franchise Generation" />
      </a>

      <main className="lg__main lg__main--centered">
        <section className="lg__card">
          <p className="lg__card-eyebrow">Sign in · {target.tag}</p>
          <h2 className="lg__card-h">
            {phase === 'email' ? 'Welcome to Franchise Generation' : 'Check your inbox'}
          </h2>
          <p className="lg__card-sub">
            {phase === 'email'
              ? 'Enter your email — we\'ll send a one-time code.'
              : <>A 6-digit code was sent to <strong>{email}</strong>.</>}
          </p>

          <form onSubmit={submit} className="lg__form">
            {phase === 'email' ? (
              <div className="lg__field">
                <label>Email address</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  required autoFocus
                  placeholder="you@example.com"
                />
              </div>
            ) : (
              <div className="lg__field">
                <label>Verification code</label>
                <input
                  type="text"
                  inputMode="numeric"
                  maxLength={6}
                  value={code}
                  onChange={(e) => setCode(e.target.value.replace(/\D/g, ''))}
                  required autoFocus
                  placeholder="123456"
                />
                <p className="lg__hint">Enter the 6-digit code sent to your email.</p>
              </div>
            )}

            {error && <p className="lg__error">{error}</p>}

            <button type="submit" className="lg__cta" disabled={loading}>
              {loading ? 'Please wait…' : phase === 'email' ? 'Continue with email' : 'Enter portal'}
              {!loading && (
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ width: 16, height: 16 }}>
                  <path d="M5 12h14M12 5l7 7-7 7"/>
                </svg>
              )}
            </button>

            {phase === 'code' && (
              <button type="button" className="lg__back" onClick={() => { setPhase('email'); setError(''); }}>
                ← Use a different email
              </button>
            )}
          </form>

          <p className="lg__foot">
            Not a member yet? <a href="landing.html">Discover the network →</a>
          </p>
        </section>

        {/* Demo accounts — shown below the card */}
        <div className="lg__demo-section">
          <p className="lg__demo-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{width:13,height:13,verticalAlign:'middle'}}><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
            Test accounts — code&nbsp;<strong>123456</strong>
          </p>
          <div className="lg__demo-groups">
            {DEMO_GROUPS.map(g => {
              const users = DEMO_USERS.filter(u => u.role === g.key);
              if (!users.length) return null;
              return (
                <div key={g.key} className="lg__demo-group">
                  <p className="lg__demo-group-label" style={{'--group-color': g.color}}>
                    {g.icon} {g.label}
                  </p>
                  {users.map(u => (
                    <button
                      key={u.id}
                      type="button"
                      className="lg__demo-tile"
                      onClick={() => loginAs(u)}
                    >
                      <span className="lg__demo-tile__avatar" style={{background: g.color}}>
                        {u.name[0]}
                      </span>
                      <span className="lg__demo-tile__info">
                        <span className="lg__demo-tile__name">{u.name}</span>
                        <span className="lg__demo-tile__email">{u.email}</span>
                      </span>
                      <span className="lg__demo-tile__dest">{u.desc} →</span>
                    </button>
                  ))}
                </div>
              );
            })}
          </div>
        </div>
      </main>

      <footer className="lg__copy">© 2026 Franchise Generation · Secure login</footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<style>
.lg__demo-section {
  width: 100%;
  max-width: 480px;
  margin-top: 28px;
}
.lg__demo-title {
  font: 500 12px/1.5 'DM Sans', system-ui, sans-serif;
  color: rgba(14,27,40,.45);
  margin: 0 0 14px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.lg__demo-groups {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.lg__demo-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.lg__demo-group-label {
  font: 600 10px/1 'DM Sans', system-ui, sans-serif;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--group-color, #444);
  margin: 0 0 2px;
  padding: 0 2px;
}
.lg__demo-tile {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: #fff;
  border: 1.5px solid rgba(14,27,40,.08);
  border-radius: 10px;
  cursor: pointer;
  text-align: left;
  transition: border-color .15s, box-shadow .15s;
  width: 100%;
}
.lg__demo-tile:hover {
  border-color: rgba(14,27,40,.25);
  box-shadow: 0 2px 8px rgba(14,27,40,.07);
}
.lg__demo-tile__avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  color: #fff;
  font: 600 13px/30px 'DM Sans', system-ui, sans-serif;
  text-align: center;
  flex-shrink: 0;
}
.lg__demo-tile__info {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex: 1;
  min-width: 0;
}
.lg__demo-tile__name {
  font: 600 12px/1 'DM Sans', system-ui, sans-serif;
  color: #1c1a17;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lg__demo-tile__email {
  font: 400 10px/1 'DM Sans', system-ui, sans-serif;
  color: rgba(14,27,40,.45);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lg__demo-tile__dest {
  font: 500 10px/1 'DM Sans', system-ui, sans-serif;
  color: rgba(14,27,40,.35);
  white-space: nowrap;
  flex-shrink: 0;
}
@media (max-width: 500px) {
  .lg__demo-groups { grid-template-columns: 1fr; }
}
.lg__portal-tabs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 24px;
}
.lg__portal-tab {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--fg-border, #e4ddd4);
  background: transparent;
  font: 500 12px/1 'DM Sans', system-ui, sans-serif;
  color: var(--fg-muted, #8a7f74);
  cursor: pointer;
  transition: all .15s;
}
.lg__portal-tab--active,
.lg__portal-tab:hover {
  border-color: var(--fg-ink, #1c1a17);
  color: var(--fg-ink, #1c1a17);
  background: var(--fg-ink, #1c1a17);
  color: #fff;
}
.lg__error {
  color: #c0392b;
  font-size: 13px;
  margin: -4px 0 8px;
  padding: 8px 12px;
  background: #fdf0ef;
  border-radius: 8px;
  border: 1px solid #f5c6c4;
}
.lg__demo-hint {
  margin-top: 24px;
  font-size: 12px;
  color: var(--fg-muted, #8a7f74);
}
.lg__demo-hint summary {
  cursor: pointer;
  list-style: none;
  user-select: none;
}
.lg__demo-hint ul {
  margin: 8px 0 0;
  padding: 0;
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.lg__demo-pick {
  display: flex;
  gap: 6px;
  align-items: baseline;
  background: none;
  border: none;
  cursor: pointer;
  font: inherit;
  color: var(--fg-ink, #1c1a17);
  text-decoration: underline;
  padding: 2px 0;
}
.lg__demo-pick span {
  font-size: 11px;
  color: var(--fg-muted, #8a7f74);
  text-decoration: none;
}
</style>
</body>
</html>
