  # =========================================================================
  # SUPPORT
  # =========================================================================
  /support/tickets:
    get:
      tags: [Support]
      summary: List support tickets
      description: Returns all support tickets for the authenticated user. Admins see all tickets.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [open, resolved, awaiting-investor, awaiting-admin]
        - name: category
          in: query
          schema:
            type: string
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, normal, high, urgent]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of tickets
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/SupportTicket'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Support]
      summary: Create support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [categoryId, subject]
              properties:
                categoryId:
                  type: string
                  enum: [investment, repayment, technical, document, legal, opportunity, general]
                  example: repayment
                priorityId:
                  type: string
                  enum: [low, normal, high, urgent]
                  default: normal
                subject:
                  type: string
                  example: "Question sur le remboursement de mai"
                brandId:
                  type: string
                  nullable: true
                  example: atelier
                message:
                  type: string
                  description: Body of the first message in the thread
                  example: "Bonjour, je n'ai pas reçu mon versement du 15 mai..."
            example:
              categoryId: repayment
              priorityId: normal
              subject: "Versement de mai non reçu"
              brandId: atelier
              message: "Bonjour, le versement prévu le 15 mai n'est pas arrivé sur mon compte."
      responses:
        '201':
          description: Ticket created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /support/tickets/{id}:
    get:
      tags: [Support]
      summary: Get ticket by ID
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Ticket detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Support]
      summary: Update ticket
      description: Change ticket status or priority. Admins can reassign tickets.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [open, resolved, awaiting-investor, awaiting-admin]
                priorityId:
                  type: string
                  enum: [low, normal, high, urgent]
                assignedTo:
                  type: string
                  description: Name of admin/agent assigned (admin only)
      responses:
        '200':
          description: Ticket updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportTicket'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /support/tickets/{id}/messages:
    get:
      tags: [Support]
      summary: Get ticket messages
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Array of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupportMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Support]
      summary: Post message to ticket
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  example: "Bonjour, j'ai déposé le document dans mon profil."
                attachments:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Optional file attachments (max 10 MB each)
      responses:
        '201':
          description: Message posted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportMessage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

