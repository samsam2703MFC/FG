openapi: 3.0.3
info:
  title: Franchise Generation API
  description: |
    REST API for the Franchise Generation platform — a multi-brand franchise ecosystem
    connecting brands, candidates, investors, consultants, and real estate developers.

    ## Authentication
    All protected endpoints require a JWT Bearer token obtained from `POST /auth/login`.
    Include the token in the `Authorization` header:
    ```
    Authorization: Bearer <token>
    ```

    ## Base URL
    Production: `https://api.franchisegeneration.be/api/v1`
    Local dev: `http://localhost:3000/api/v1`

    ## Roles
    | Role | Description |
    |------|-------------|
    | `admin` | Full backoffice access |
    | `investor` | Investment portal access |
    | `candidate` | Candidate onboarding portal |
    | `consultant` | Lead management access |
    | `developer` | Real estate developer access |
    | `brand` | Brand management portal |

  version: 1.0.0
  contact:
    name: Franchise Generation
    url: https://franchisegeneration.be

servers:
  - url: /api/v1
    description: Current version

security:
  - BearerAuth: []

tags:
  - name: Auth
    description: Authentication and user profile
  - name: Brands
    description: Brand catalog and brand-specific resources
  - name: Opportunities
    description: Investment and franchise opportunities
  - name: Candidates
    description: Franchise candidate management
  - name: Investors
    description: Investor profiles and portfolios
  - name: Leads
    description: Candidate lead pipeline (consultant-facing)
  - name: Consultants
    description: Consultant directory and lead assignment
  - name: Developers
    description: Real estate developer profiles
  - name: Support
    description: Helpdesk ticketing system
  - name: Documents
    description: Document vault (contracts, KYC, schedules)
  - name: Notifications
    description: User notification feed
  - name: Regions
    description: Geographic region reference data
  - name: Landing
    description: CMS-managed public landing page content
  - name: Backoffice
    description: Admin dashboard and statistics

# ---------------------------------------------------------------------------
# PATHS
# ---------------------------------------------------------------------------
paths:

  # =========================================================================
  # AUTH
  # =========================================================================
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: Authenticate with email/password and receive a JWT access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                  example: claire.vermeulen@example.com
                password:
                  type: string
                  format: password
                  example: "MySecurePassword123!"
                portal:
                  type: string
                  enum: [investor, candidate, brand, developer, admin]
                  description: Portal context hint (used to redirect after login)
                  example: investor
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JWTResponse'
              example:
                token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJpbnZfMDAxIn0.abc123
                expiresIn: 86400
                user:
                  id: inv_001
                  email: claire.vermeulen@example.com
                  role: investor
                  name: Claire Vermeulen
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                error: INVALID_CREDENTIALS
                message: Email or password is incorrect.
        '500':
          $ref: '#/components/responses/InternalError'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout
      description: Invalidate the current JWT token (server-side blocklist).
      responses:
        '204':
          description: Logged out successfully
        '401':
          $ref: '#/components/responses/Unauthorized'

  /me:
    get:
      tags: [Auth]
      summary: Get current user profile
      description: Returns the full profile of the authenticated user based on their role.
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/Investor'
                  - $ref: '#/components/schemas/Candidate'
              example:
                id: inv_001
                name: Claire Vermeulen
                initials: CV
                email: claire.vermeulen@example.com
                role: investor
                tier: Privilège
                phone: "+32 477 12 34 56"
                address: "Avenue Louise 142 · 1050 Bruxelles"
                nationality: Belge
                iban: BE68 5390 0754 7034
                since: "Juin 2023"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      tags: [Auth]
      summary: Update current user profile
      description: Update editable fields on the authenticated user's profile.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:
                  type: string
                  example: "+32 477 12 34 56"
                address:
                  type: string
                  example: "Avenue Louise 142 · 1050 Bruxelles"
                iban:
                  type: string
                  example: BE68 5390 0754 7034
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Profile updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalError'

  /me/preferences:
    get:
      tags: [Auth]
      summary: Get notification preferences
      description: Returns all notification/communication preferences for the current user.
      responses:
        '200':
          description: List of notification preferences
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: pay-email
                    label:
                      type: string
                      example: "E-mail · versements reçus"
                    channel:
                      type: string
                      enum: [email, sms, push]
                      example: email
                    enabled:
                      type: boolean
                      example: true
              example:
                - id: pay-email
                  label: "E-mail · versements reçus"
                  channel: email
                  enabled: true
                - id: crit-sms
                  label: "SMS · alertes critiques uniquement"
                  channel: sms
                  enabled: true
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Auth]
      summary: Update notification preferences
      description: Bulk-update notification preference toggles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required: [id, enabled]
                properties:
                  id:
                    type: string
                    example: pay-email
                  enabled:
                    type: boolean
                    example: false
            example:
              - id: pay-email
                enabled: false
              - id: crit-sms
                enabled: true
      responses:
        '200':
          description: Preferences updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Preferences updated successfully.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # =========================================================================
  # BRANDS
  # =========================================================================
  /brands:
    get:
      tags: [Brands]
      summary: List all brands
      description: Returns the full catalog of brands in the FG ecosystem.
      security: []
      responses:
        '200':
          description: Array of brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Brand'
              example:
                - id: atelier
                  name: "L'Atelier By"
                  tagline: "Boulangerie de quartier · Belgique"
                  kind: "Boulangerie · Pâtisserie"
                  city: Bruxelles
                  headquarters: "Bruxelles, BE"
                  founded: 2022
                  established: "5 magasins"
                  logoSrc: img/logo.png
                  logoMark: A
                  theme: atelier
        '500':
          $ref: '#/components/responses/InternalError'

  /brands/{id}:
    get:
      tags: [Brands]
      summary: Get brand by ID
      description: Returns full brand detail including tokens (design system) and copy.
      security: []
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Brand detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Brand'
                  - type: object
                    properties:
                      tokens:
                        $ref: '#/components/schemas/BrandTokens'
                      kpiLabels:
                        type: object
                        properties:
                          ca:
                            type: string
                          profit:
                            type: string
                          cust:
                            type: string
                          basket:
                            type: string
                      copy:
                        type: object
                        properties:
                          ecoNoun:
                            type: string
                          ecoNounPlural:
                            type: string
                          verdict:
                            type: string
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /brands/{id}/presentation:
    get:
      tags: [Brands]
      summary: Get brand investor presentation
      description: CMS-managed investor presentation data including hero, carousel, videos, concept, investment terms, team and documents.
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Full brand presentation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrandPresentation'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /brands/{id}/shops:
    get:
      tags: [Brands]
      summary: List brand shops
      description: Returns all shops (franchise locations) belonging to a brand, with latest KPI snapshots.
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Array of shops
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Shop'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /brands/{id}/opportunities:
    get:
      tags: [Brands]
      summary: List brand opportunities
      description: Returns investment/franchise opportunities belonging to a specific brand.
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Array of opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Opportunity'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /brands/{id}/team:
    get:
      tags: [Brands]
      summary: Get brand team
      description: Returns the team roster for a brand (shown in investor presentation).
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Array of team members
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    role:
                      type: string
                      example: "Co-fondateur"
                    personName:
                      type: string
                      example: Sam Verheyden
                    description:
                      type: string
                      example: "Co-fondateur · stratégie & gouvernance"
                    canContact:
                      type: boolean
                      example: true
                    order:
                      type: integer
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /brands/{id}/documents:
    get:
      tags: [Brands]
      summary: List brand documents
      description: Returns downloadable brand documents (decks, franchise dossiers, legal) available to authenticated investors.
      parameters:
        - $ref: '#/components/parameters/brandId'
      responses:
        '200':
          description: Array of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    kind:
                      type: string
                      example: "Brand deck"
                    title:
                      type: string
                      example: "L'Atelier By — Deck investisseur 2026"
                    size:
                      type: string
                      example: "4,2 MB"
                    url:
                      type: string
                      format: uri
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # OPPORTUNITIES
  # =========================================================================
  /opportunities:
    get:
      tags: [Opportunities]
      summary: List opportunities
      description: Returns the marketplace of franchise/investment opportunities with optional filters.
      security: []
      parameters:
        - name: brand
          in: query
          description: Filter by brand ID
          schema:
            type: string
            example: atelier
        - name: region
          in: query
          description: Filter by region code
          schema:
            type: string
            example: bxl
        - name: status
          in: query
          description: Filter by status
          schema:
            type: string
            enum: [open, closing, closed, pre-launch]
            example: open
        - name: type
          in: query
          description: Filter by opportunity type
          schema:
            type: string
            enum: [franchise, investment, new-brand]
            example: franchise
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of opportunities
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedList'
              example:
                data:
                  - id: op-gent
                    brand: atelier
                    name: "L'Atelier Gand"
                    city: Gent
                    region: fla
                    format: "Boutique 84 m²"
                    openingDate: "Q3 2026"
                    requiredInvest: 320000
                    candidateContrib: 60000
                    financingNeed: "Tax shelter + prêt investisseur"
                    payback: "4,8 ans"
                    status: "Closing imminent"
                    type: franchise
                total: 6
                page: 1
                limit: 20
        '500':
          $ref: '#/components/responses/InternalError'

  /opportunities/{id}:
    get:
      tags: [Opportunities]
      summary: Get opportunity by ID
      description: Returns full detail for a single opportunity.
      security: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Opportunity detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Opportunity'
        '404':
          $ref: '#/components/responses/NotFound'

  /opportunities/{id}/interest:
    post:
      tags: [Opportunities]
      summary: Express interest in an opportunity
      description: Registers the authenticated user's interest in an opportunity, creating a lead or investment intent record.
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                message:
                  type: string
                  description: Optional note from the investor/candidate
                  example: "Je souhaite avoir plus d'informations sur le financement disponible."
                budget:
                  type: integer
                  description: Intended investment amount in EUR
                  example: 25000
      responses:
        '201':
          description: Interest registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Your interest has been registered. A consultant will contact you shortly.
                  leadId:
                    type: string
                    example: lead-042
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Interest already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # =========================================================================
  # CANDIDATES
  # =========================================================================
  /candidates:
    get:
      tags: [Candidates]
      summary: List candidates
      description: Returns all candidate profiles. Accessible by admin and consultants.
      parameters:
        - name: region
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [to-analyse, in-discussion, recommended, validated, rejected, on-hold]
        - name: consultant
          in: query
          description: Filter by assigned consultant ID
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of candidates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Candidate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Candidates]
      summary: Create candidate profile
      description: Creates a new candidate record (triggered during onboarding form submission).
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
            example:
              firstName: Marie
              lastName: Lemoine
              email: marie.lemoine@example.com
              phone: "+32 478 11 22 33"
              address: "Avenue Louise 142 · 1050 Bruxelles"
              preferredRegion: bxl
              language: "Français · Néerlandais (B2)"
              experience: "Store Manager Decathlon 5 ans"
              currentSituation: "En poste · disponible à 3 mois"
              motivation: "Envie d'entreprendre dans un cadre structuré."
              budget: 75000
              financingCapacity: "Apport personnel + prêt BNP Fortis jusqu'à 150 000 €"
              brandPreference: [cookies, couq]
      responses:
        '201':
          description: Candidate created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /candidates/{id}:
    get:
      tags: [Candidates]
      summary: Get candidate by ID
      description: Returns the full candidate profile. Candidates can only access their own record.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Candidate detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags: [Candidates]
      summary: Update candidate profile
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CandidateCreate'
      responses:
        '200':
          description: Candidate updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Candidate'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /candidates/{id}/leads:
    get:
      tags: [Candidates]
      summary: Get candidate's leads
      description: Returns all opportunity leads linked to a candidate.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Array of candidate leads
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateLead'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

    post:
      tags: [Candidates]
      summary: Add lead to candidate
      description: Links a candidate to a new opportunity (creates a CandidateLead record).
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [opportunityId]
              properties:
                opportunityId:
                  type: string
                  example: op-bxl-cookies
                consultantId:
                  type: string
                  description: Override auto-assignment
      responses:
        '201':
          description: Lead created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateLead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /candidates/{id}/leads/{leadId}:
    put:
      tags: [Candidates]
      summary: Update a candidate lead
      description: Update validation status, fit score, or consultant notes on a specific candidate-opportunity link.
      parameters:
        - $ref: '#/components/parameters/id'
        - name: leadId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                validationStatus:
                  type: string
                  enum: [to-analyse, in-discussion, recommended, validated, rejected, on-hold]
                fitScore:
                  type: integer
                  minimum: 0
                  maximum: 100
                consultantNotes:
                  type: string
      responses:
        '200':
          description: Lead updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateLead'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

  /candidates/{id}/documents:
    get:
      tags: [Candidates]
      summary: Get candidate documents
      description: Returns documents submitted or requested for a candidate (CV, financial proofs, motivation letter, etc.).
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Array of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # =========================================================================
  # INVESTORS
  # =========================================================================
  /investors:
    get:
      tags: [Investors]
      summary: List investors
      description: Returns all investor profiles. Accessible by admin only.
      parameters:
        - name: tier
          in: query
          schema:
            type: string
            enum: [Bronze, Argent, Or, Privilège]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Paginated list of investors
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedList'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Investor'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /investors/{id}:
    get:
      tags: [Investors]
      summary: Get investor by ID
      description: Returns the full investor profile. Investors can only access their own record.
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Investor detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Investor'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /investors/{id}/portfolio:
    get:
      tags: [Investors]
      summary: Get investor portfolio
      description: Returns all investments grouped by brand, including shop-level KPIs and performance charts.
      parameters:
        - $ref: '#/components/parameters/id'
        - name: brand
          in: query
          description: Filter to a specific brand
          schema:
            type: string
      responses:
        '200':
          description: Portfolio data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvestorPortfolio'
              example:
                summary:
                  totalInvested: 85000
                  totalRepaid: 8580
                  totalValuation: 91200
                  roiTarget: 8.4
                  roiCurrent: 8.0
                brands:
                  - brandId: atelier
                    summary:
                      invested: 45000
                      repaid: 6200
