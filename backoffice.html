<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Franchise Generation — Back Office</title>
<link rel="stylesheet" href="fg.css" />
<link rel="stylesheet" href="backoffice.css" />
</head>
<body class="fg-mode">
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="fg-data.js"></script>
<script src="portal-data.js"></script>
<script type="text/babel" src="backoffice.jsx"></script>

<script type="text/babel" data-presets="env,react">
// Auth guard — admin and consultant roles only
(function () {
  try {
    const stored = JSON.parse(localStorage.getItem('fg_auth') || '{}');
    const allowed = ['admin', 'consultant'];
    if (!stored.token || Date.now() >= stored.expiresAt) {
      window.location.replace('login.html?portal=admin');
      return;
    }
    if (!allowed.includes(stored.user?.role)) {
      // Wrong role — send back to their own portal
      const dest = stored.user?.role === 'investor' ? 'index.html' : 'login.html?portal=admin';
      window.location.replace(dest);
      return;
    }
    // Expose current user globally for BackOffice component
    window.FG_CURRENT_USER = stored.user;
  } catch (_) {
    window.location.replace('login.html?portal=admin');
  }
})();

function BackOfficeApp() {
  const handleLogout = () => {
    localStorage.removeItem('fg_auth');
    window.location.replace('login.html?portal=admin');
  };
  return <BackOffice currentUser={window.FG_CURRENT_USER} onLogout={handleLogout} />;
}

ReactDOM.createRoot(document.getElementById('root')).render(<BackOfficeApp />);
</script>
</body>
</html>
