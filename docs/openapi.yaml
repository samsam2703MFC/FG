    get:
      tags: [Support]
      summary: List support categories
      security: []
      responses:
        '200':
          description: Array of support categories
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: investment
                    label:
                      type: string
                      example: "Question d'investissement"
              example:
                - id: investment
                  label: "Question d'investissement"
                - id: repayment
                  label: "Question de remboursement"
                - id: technical
                  label: "Problème technique"
                - id: document
                  label: "Problème de document"
                - id: legal
                  label: "Juridique / conformité"

