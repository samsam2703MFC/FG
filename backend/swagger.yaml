  # ─────────────────────────────────────────────────────────────
  # ONBOARDING
  # ─────────────────────────────────────────────────────────────
  /api/onboarding/{id}:
    get:
      tags: [Onboarding]
      summary: Get onboarding record with journey and progress (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string }, description: "Onboarding record UUID" }
      responses:
        '200':
          description: Onboarding record with journey steps
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      record:   { $ref: '#/components/schemas/OnboardingRecord' }
                      journey:
                        type: array
                        description: "19 journey steps (s1–s9, p1–p8, opening)"
                        items:
                          type: object
                          properties:
                            id:       { type: string }
                            code:     { type: string, example: s6 }
                            ordinal:  { type: integer }
                            category: { type: string, enum: [PIPELINE, LEGAL, MANAGEMENT, FORMATION, STAGE, OPENING] }
                            title:    { type: string }
                            status:   { type: string, enum: [locked, active, done] }
                            items:    { type: array }
                      progress:
                        type: object
                        properties:
                          totalRequired: { type: integer }
                          totalDone:     { type: integer }
                          pct:           { type: number }
        '404': { description: Onboarding record not found }

  /api/onboarding/{id}/items/{itemId}/toggle:
    post:
      tags: [Onboarding]
      summary: Toggle a checklist item done/undone (admin/consultant)
      parameters:
        - { in: path, name: id,     required: true, schema: { type: string } }
        - { in: path, name: itemId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Updated item
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:   { type: string }
                      done: { type: boolean }

  /api/onboarding/{id}/items/{itemId}/upload:
    post:
      tags: [Onboarding]
      summary: Mark an item as uploaded (admin/consultant)
      parameters:
        - { in: path, name: id,     required: true, schema: { type: string } }
        - { in: path, name: itemId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Item marked uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      id:       { type: string }
                      uploaded: { type: boolean }
                      done:     { type: boolean }

  /api/onboarding/{id}/steps/{stepId}/advance:
    post:
      tags: [Onboarding]
      summary: Advance to next step — validates required items are done (admin/consultant)
      parameters:
        - { in: path, name: id,     required: true, schema: { type: string } }
        - { in: path, name: stepId, required: true, schema: { type: string } }
      responses:
        '200':
          description: Step advanced
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      stepId:      { type: string }
                      stepStatus:  { type: string }
                      nextStepId:  { type: string, nullable: true }
                      nextStepCode: { type: string, nullable: true }
        '409': { description: Required items not yet completed }

  /api/onboarding/{id}/items/{itemId}/notes:
