                  openLeads:
                    type: integer
                    example: 18
                  pendingDocuments:
                    type: integer
                    example: 6
                  openTickets:
                    type: integer
                    example: 3
                  newBrandLeads:
                    type: integer
                    example: 2
                  recentActivity:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                          enum: [lead_created, lead_updated, ticket_opened, document_uploaded, candidate_registered]
