<title>New Brand — Franchise Generation Back Office</title>

</head>
<body class="fg-mode">

<!-- Auth guard — admin only -->
<script>
(function () {
  var stored = JSON.parse(localStorage.getItem('fg_auth') || '{}');
  if (!stored.token || Date.now() >= stored.expiresAt) {
    window.location.replace('login.html?portal=admin');
    return;
  }
  if (stored.user && stored.user.role !== 'admin') {
    window.location.replace('backoffice.html');
    return;
  }
  window.FG_CURRENT_USER = stored.user;
})();
</script>

<div id="root"></div>
