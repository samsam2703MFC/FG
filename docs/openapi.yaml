    SupportTicket:
      type: object
      description: A helpdesk support ticket
      properties:
        id:
          type: string
          example: t-001
        userId:
          type: string
        categoryId:
          type: string
          enum: [investment, repayment, technical, document, legal, opportunity, general]
          example: document
        priorityId:
          type: string
          enum: [low, normal, high, urgent]
          example: high
        subject:
          type: string
          example: "Justificatif de domicile à renouveler"
