<!-- logoFilter helper lives in fg-shell.jsx — inline minimal copy here to avoid loading the whole investor shell -->
<script type="text/babel" data-presets="env,react">
window.logoFilter = function (hex) {
  if (!hex) return 'brightness(0) invert(1)';
  const h = hex.replace('#', '');
  const r = parseInt(h.slice(0, 2), 16) / 255;
  const g = parseInt(h.slice(2, 4), 16) / 255;
  const b = parseInt(h.slice(4, 6), 16) / 255;
  const adj = (c) => c <= 0.03928 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4);
  const L = 0.2126 * adj(r) + 0.7152 * adj(g) + 0.0722 * adj(b);
  return L > 0.55 ? 'brightness(0)' : 'brightness(0) invert(1)';
};
</script>

<script type="text/babel" src="fg-landing.jsx"></script>

<script type="text/babel" data-presets="env,react">
const FG = window.FG_DATA;
function App() {
