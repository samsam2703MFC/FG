          type: string
          enum: [investor, admin, system]
          example: admin
        unreadMessages:
          type: integer
          example: 1
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        messages:
          type: array
          items:
            $ref: '#/components/schemas/SupportMessage'

    # -------------------------------------------------------------------------
    SupportMessage:
      type: object
      description: A message within a support ticket thread
      properties:
        id:
          type: string
          example: m-001
        ticketId:
          type: string
        fromType:
          type: string
          enum: [investor, admin, system]
          example: admin
        authorName:
          type: string
          example: "Émilie Devos"
        content:
          type: string
          example: "Bonjour Claire, votre justificatif de domicile date de plus de 2 ans..."
        unread:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        attachments:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              filename:
                type: string
              url:
                type: string
                format: uri
              size:
                type: string

    # -------------------------------------------------------------------------
    Document:
      type: object
      description: A document in the platform vault (contract, KYC, schedule, etc.)
      properties:
        id:
          type: string
          example: d-kyc-id
        ownerId:
          type: string
          description: ID of the investor or candidate who owns this document
        ownerType:
          type: string
          enum: [investor, candidate]
        brandId:
          type: string
          nullable: true
          example: atelier
        type:
          type: string
          enum: [investment, ownership, kyc, aml, banking, tax, contract, schedule, statement]
          example: kyc
        status:
          type: string
          enum: [validated, pending, expired, missing, signed, review]
          example: validated
        title:
          type: string
          example: "Pièce d'identité — Carte d'identité belge"
        sub:
          type: string
          example: "Recto + verso"
        filename:
          type: string
          nullable: true
        url:
          type: string
          format: uri
          nullable: true
          description: Signed download URL (time-limited)
        size:
          type: string
          nullable: true
          example: "2,4 MB"
        date:
          type: string
          description: Document date (formatted)
          example: "15/06/2023"
        expiresAt:
          type: string
          format: date
          nullable: true
          example: "2033-06-15"
        createdAt:
          type: string
          format: date-time

    # -------------------------------------------------------------------------
    Notification:
      type: object
      description: A user notification
      properties:
        id:
          type: string
          example: n1
        userId:
          type: string
        kind:
          type: string
          enum: [payment, report, doc, opp, system]
          example: payment
        brand:
          type: string
          nullable: true
          example: atelier
        title:
          type: string
          example: "Versement reçu · L'Atelier Châtelain"
        body:
          type: string
          example: "1 248 € versés (échéance Mai)"
        read:
          type: boolean
          example: false
        createdAt:
          type: string
          format: date-time
          example: "2026-05-16T07:00:00Z"

    # -------------------------------------------------------------------------
    Region:
      type: object
      description: A geographic region reference
      properties:
        id:
          type: string
          example: bxl
        code:
          type: string
          example: bxl
        label:
          type: string
          example: Bruxelles-Capitale

    # -------------------------------------------------------------------------
    JWTResponse:
      type: object
      description: Successful authentication response
      properties:
        token:
          type: string
          description: JWT Bearer token
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        expiresIn:
          type: integer
          description: Token lifetime in seconds
          example: 86400
        user:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            role:
              type: string
              enum: [admin, investor, candidate, consultant, developer, brand]
            name:
              type: string

    # -------------------------------------------------------------------------
    ErrorResponse:
      type: object
      description: Standard error response envelope
      properties:
        error:
          type: string
          description: Machine-readable error code
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error description
          example: Request validation failed.
        details:
          type: array
          nullable: true
          description: Field-level validation errors
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string

    # -------------------------------------------------------------------------
    PaginatedList:
      type: object
      description: Generic paginated list wrapper
      properties:
        data:
          type: array
          items: {}
          description: Array of result items
        total:
          type: integer
          description: Total number of matching records
          example: 42
        page:
          type: integer
          description: Current page number (1-indexed)
          example: 1
        limit:
          type: integer
          description: Number of items per page
          example: 20
        totalPages:
          type: integer
          description: Total number of pages
          example: 3
