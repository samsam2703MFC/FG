          example: 92
        consultantId:
          type: string
          nullable: true
        consultantNotes:
          type: string
        documents:
          type: array
          items:
            type: string
          description: List of requested/submitted document names
        history:
          type: array
          items:
            type: object
            properties:
              at:
                type: string
                example: "12 mai 2026"
              author:
                type: string
              body:
                type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

