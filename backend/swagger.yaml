        - { in: query, name: investorId, schema: { type: string } }
        - { in: query, name: brand,      schema: { type: string } }
        - { in: query, name: status,     schema: { type: string } }
        - { in: query, name: page,       schema: { type: integer, default: 1 } }
        - { in: query, name: limit,      schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Repayment list }

  /api/backoffice/tasks:
    get:
      tags: [Backoffice]
      summary: List CRM tasks (admin only)
      description: CRM tasks are created automatically when an opportunity is validated (one per losing candidate).
      parameters:
        - { in: query, name: status,     schema: { type: string, enum: [pending, done, cancelled] } }
        - { in: query, name: assignedTo, schema: { type: string } }
        - { in: query, name: page,       schema: { type: integer, default: 1 } }
        - { in: query, name: limit,      schema: { type: integer, default: 50 } }
      responses:
        '200':
          description: CRM task list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { type: array, items: { $ref: '#/components/schemas/CrmTask' } }
                  meta: { $ref: '#/components/schemas/Meta' }

  # ─────────────────────────────────────────────────────────────
  # SHOPS
  # ─────────────────────────────────────────────────────────────
  /api/shops:
    get:
      tags: [Shops]
      summary: List shops
      parameters:
        - { in: query, name: brandId, schema: { type: string } }
        - { in: query, name: region,  schema: { type: string } }
        - { in: query, name: status,  schema: { type: string } }
        - { in: query, name: page,    schema: { type: integer, default: 1 } }
        - { in: query, name: limit,   schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Shop list }

  /api/shops/{id}:
    get:
      tags: [Shops]
      summary: Get a single shop
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Shop object }

  /api/shops/{id}/reports:
    get:
      tags: [Shops]
      summary: List monthly performance reports for a shop (admin/consultant)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
        - { in: query, name: month, schema: { type: string } }
        - { in: query, name: page,  schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Report list with financial data }

  /api/shops/{id}/kpi:
    get:
      tags: [Shops]
      summary: Get KPI snapshot for a shop
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: KPI snapshot with ROI and health status }

  # ─────────────────────────────────────────────────────────────
  # DOCUMENTS
  # ─────────────────────────────────────────────────────────────
  /api/documents:
    get:
      tags: [Documents]
      summary: List documents
      parameters:
        - { in: query, name: type,    schema: { type: string } }
        - { in: query, name: brand,   schema: { type: string } }
        - { in: query, name: status,  schema: { type: string } }
        - { in: query, name: project, schema: { type: string } }
        - { in: query, name: page,    schema: { type: integer, default: 1 } }
        - { in: query, name: limit,   schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Document list }
    post:
      tags: [Documents]
      summary: Upload a document (multipart/form-data, max 25 MB)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [type, title]
              properties:
                type:    { type: string }
                title:   { type: string, minLength: 2, maxLength: 200 }
                brand:   { type: string }
                project: { type: string }
                sub:     { type: string }
                expiry:  { type: string }
                file:    { type: string, format: binary, description: "Allowed: .pdf .docx .doc .xlsx .xls .png .jpg .jpeg" }
      responses:
        '201': { description: Document uploaded }

  /api/documents/types:
    get:
      tags: [Documents]
      summary: List document type definitions
      responses:
        '200': { description: Document types }

  /api/documents/{id}:
    get:
      tags: [Documents]
      summary: Get document metadata
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Document metadata }
    put:
      tags: [Documents]
      summary: Update document metadata (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:  { type: string, enum: [validated, pending, expired, missing, signed, review] }
                title:   { type: string, minLength: 2, maxLength: 200 }
                sub:     { type: string }
                expiry:  { type: string }
                brand:   { type: string }
                project: { type: string }
      responses:
        '200': { description: Updated document }
    delete:
      tags: [Documents]
      summary: Soft-delete a document (admin only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Document deleted }

  # ─────────────────────────────────────────────────────────────
  # NOTIFICATIONS
  # ─────────────────────────────────────────────────────────────
  /api/notifications:
    get:
      tags: [Notifications]
      summary: List notifications for current user
      parameters:
        - { in: query, name: kind,   schema: { type: string } }
        - { in: query, name: brand,  schema: { type: string } }
        - { in: query, name: unread, schema: { type: boolean } }
        - { in: query, name: page,   schema: { type: integer, default: 1 } }
        - { in: query, name: limit,  schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Notification list with unreadCount }

  /api/notifications/read-all:
    put:
      tags: [Notifications]
      summary: Mark all notifications as read
      responses:
        '200': { description: Count of notifications marked }

  /api/notifications/{id}/read:
    put:
      tags: [Notifications]
      summary: Mark a single notification as read
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Notification marked read }

  /api/notifications/{id}:
    delete:
      tags: [Notifications]
      summary: Delete a notification (hard delete)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Notification deleted }

  # ─────────────────────────────────────────────────────────────
  # SUPPORT
  # ─────────────────────────────────────────────────────────────
  /api/support/tickets:
    get:
      tags: [Support]
      summary: List support tickets (non-admins see own only)
      parameters:
        - { in: query, name: status,   schema: { type: string } }
        - { in: query, name: category, schema: { type: string } }
        - { in: query, name: brand,    schema: { type: string } }
        - { in: query, name: priority, schema: { type: string } }
        - { in: query, name: origin,   schema: { type: string } }
        - { in: query, name: page,     schema: { type: integer, default: 1 } }
        - { in: query, name: limit,    schema: { type: integer, default: 20 } }
      responses:
        '200': { description: Ticket list (without full message bodies) }
    post:
      tags: [Support]
      summary: Create a support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, category, body]
              properties:
                subject:  { type: string, minLength: 3, maxLength: 200 }
                category: { type: string }
                body:     { type: string, minLength: 10, maxLength: 5000 }
                priority: { type: string, enum: [low, normal, high, urgent] }
                brand:    { type: string }
                project:  { type: string }
      responses:
        '201': { description: Ticket created with initial message }

  /api/support/categories:
    get:
      tags: [Support]
      summary: List support categories
      responses:
        '200': { description: Category list }

  /api/support/priorities:
    get:
      tags: [Support]
      summary: List priority levels
      responses:
        '200': { description: Priority list }

  /api/support/tickets/{id}:
    get:
      tags: [Support]
      summary: Get a ticket with full message thread
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Full ticket with messages }
    put:
      tags: [Support]
      summary: Update ticket (investors limited to status only)
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:     { type: string, enum: [open, resolved, awaiting-investor, closed, in-progress] }
                priority:   { type: string, enum: [low, normal, high, urgent] }
                assignedTo: { type: string }
                brand:      { type: string, description: "Admin only" }
                project:    { type: string, description: "Admin only" }
      responses:
        '200': { description: Updated ticket }

  /api/support/tickets/{id}/messages:
    get:
      tags: [Support]
      summary: Get all messages for a ticket
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        '200': { description: Message list }
    post:
      tags: [Support]
      summary: Post a reply to a ticket
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:        { type: string, minLength: 1, maxLength: 5000 }
                attachments: { type: array }
      responses:
        '201': { description: Message posted }

  # ─────────────────────────────────────────────────────────────
  # REGIONS
  # ─────────────────────────────────────────────────────────────
  /api/regions:
    get:
      tags: [Regions]
      summary: List geographic regions
      security: []
